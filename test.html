<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <title>test test</title>
  <link rel="stylesheet" href="test.css">

  <style>
    #bg-container {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 2;
    }

    .bg-image {
      position: absolute;
      width: 400px;
      opacity: 0.2;
      pointer-events: none;
      animation: float 40s linear infinite;
    }

    @keyframes float {
      from {
        transform: translate(var(--x-start), var(--y-start));
      }
      to {
        transform: translate(var(--x-end), var(--y-end));
      }
    }
  </style>
</head>
<body>


<section class="hero">
  <canvas id="canvas" width="500" height="500"></canvas>
  <div>
    <h1>Animated Gradient</h1>
    <p>
      Lorem ipsum dolor sit amet,
      consectetur adipisicing elit.
      Aspernatur blanditiis cumque
      eum excepturi facere iste iure
      magnam modi, necessitatibus nihil
      nulla odio quam qui reiciendis sed
      suscipit vel veniam voluptatum!
    </p>
  </div>
</section>

<div id="bg-container"></div>

<script src="test_test.js"></script>
<script>
  const images = [
    "Images/test/bg1.png",
    "Images/test/bg2.jpg",
    "Images/test/bg3.jpg"
  ];

  const container = document.getElementById("bg-container");

  // pick random image
  const img = document.createElement("img");
  img.src = images[Math.floor(Math.random() * images.length)];
  img.className = "bg-image";

  // random path values
  const vw = window.innerWidth;
  const vh = window.innerHeight;

  img.style.setProperty("--x-start", `${Math.random() * vw}px`);
  img.style.setProperty("--y-start", `${Math.random() * vh}px`);
  img.style.setProperty("--x-end", `${Math.random() * vw}px`);
  img.style.setProperty("--y-end", `${Math.random() * vh}px`);

  img.style.animationDuration = `${30 + Math.random() * 40}s`;

  container.appendChild(img);
</script>

</body>
</html>

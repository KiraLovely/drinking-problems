<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <title>test test</title>
  <link rel="stylesheet" href="test.css">
</head>
<body>

<p>I love Vivian</p>

<script>

    //Just holding this JS here for when I need it later :3
    async function loadCups() {
        const { data: Cups, error } = await supabaseClient
            .from('waifuCups') //Table Name
            .select('*');

        if (error) {
            console.error('Error loading Cups:', error);
            return;
        }

        async function loadText(url) {
            const response = await fetch(url);
            const text = await response.text();
            return text;
        }

        const container = document.getElementById('plastic_container');
        container.innerHTML = '';

        for (const Cup of Cups) {
            const card = document.createElement('div');
            card.classList.add('cup-card');

            let description = '';

            if (Cup.text_test) {
                description = await loadText(Cup.text_test);
            }

            card.innerHTML = `
        <img src="${Cup.cup_preview_image}" class="cup-preview" alt="${Cup.cup_name}">
        <h3>${Cup.cup_name}</h3>
        <p><strong>Partner/Creator Name:</strong> ${Cup.partner_name}</p>
        <p><strong>Artist: </strong>${Cup.artist_name}</p>
        <p>${description}</p>
    `;

            container.appendChild(card);
        }
    }

    loadCups();
</script>
</body>
</html>

<!DOCTYPE html>

<head>

  <link rel="stylesheet" href="test.css">

  <style>
    #bg-container {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 2;
    }

    .bg-image {
      position: absolute;
      width: 400px;
      pointer-events: none;
      animation: float 40s linear infinite;
    }

    @keyframes float {
      from {
        transform: translate(var(--x-start), var(--y-start));
      }
      to {
        transform: translate(var(--x-end), var(--y-end));
      }
    }
  </style>
</head>

<section class="hero">
  <canvas id="canvas" width="500" height="500"></canvas>
